# Edge DoS guards (http context — this file is included inside the nginx http{} block).
limit_req_zone  $binary_remote_addr zone=glassops_req:10m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=glassops_conn:10m;

server {
    listen 7440;
    server_tokens off;              # don't leak the nginx version
    root /app/static;
    index index.html;

    client_max_body_size 10m;       # blunt body-based DoS (control-plane is small JSON)
    limit_conn glassops_conn 50;    # concurrent connections per client IP
    limit_req  zone=glassops_req burst=40 nodelay;

    # IP whitelist (generated by entrypoint.sh)
    if ($ip_whitelist = 0) {
        return 403;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Content-Security-Policy — derived from the built SPA bundle: an external module
    # script (script-src 'self', no unsafe-inline), runtime inline styles + the
    # Pretendard webfont from jsDelivr (style-src/font-src), same-origin WebSockets
    # (connect-src 'self' ws: wss:), and blob workers/images (xterm/recharts).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net data:; img-src 'self' data: blob:; connect-src 'self' ws: wss:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
    # HSTS — enable ONLY when this is served over TLS (ignored over plain HTTP, and a
    # stale max-age can lock out a later plain-HTTP deploy). Uncomment behind TLS:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Frontend static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        # Force the scheme at the trust boundary — never forward a client-supplied
        # X-Forwarded-Proto (this edge is plain HTTP and loopback-bound, so it can't
        # distinguish a trusted upstream proxy from a local client). For an external
        # TLS-terminating proxy, set GLASSOPS_FORCE_SECURE_COOKIES=true instead (WEB-04).
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:8000;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}
