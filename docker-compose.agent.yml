services:
  glassops-agent:
    build: ./agent
    image: glassops-agent
    container_name: glassops-agent
    restart: unless-stopped
    pid: host
    # Required for per-container CPU/MEM metrics — do NOT remove (see docker-compose.yml
    # for why: /proc/<pid>/cgroup paths are cgroup-namespace-relative).
    cgroup: host
    # Least privilege instead of `privileged: true` (see docker-compose.yml). The
    # agent's remote terminal uses nsenter+su just like the dashboard, so it needs
    # the same capability set; the rest are dropped.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN            # parity with the dashboard image
      - SYS_ADMIN        # nsenter: setns into host namespaces (terminal)
      - SYS_PTRACE       # read /proc/1/ns/*
      - SYS_CHROOT       # nsenter / login namespace + root switch
      - DAC_READ_SEARCH
      - DAC_OVERRIDE     # read host files (e.g. shadow) as root
      - SETUID
      - SETGID           # su drops to the target host user
      - KILL             # process.kill on host processes owned by other users
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    network_mode: host
    group_add:
      - "${GLASSOPS_DOCKER_GID:-999}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /proc:/host/proc:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /var/log:/host/log:ro
      - /etc/os-release:/host/os-release:ro
    environment:
      - HOST_PROC=/host/proc
      - HOST_LOG=/host/log
    env_file: agent.env
