services:
  glassops:
    build: .
    ports:
      - "127.0.0.1:${GLASSOPS_PORT:-7440}:7440"
    pid: host
    # Least privilege instead of `privileged: true` (see docker-compose.yml).
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SYS_ADMIN
      - SYS_PTRACE
      - SYS_CHROOT
      - DAC_READ_SEARCH
      - DAC_OVERRIDE
      - SETUID
      - SETGID
      - KILL
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    volumes:
      - glassops_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/log:/host/log:ro
      - /proc:/host/proc:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - ./backend/app:/app/app       # Backend hot-reload (uvicorn --reload)
      - ./agent/agent:/app/agent     # Agent code mount
    env_file: .env
    environment:
      - HOST_PROC=/host/proc
      - HOST_LOG=/host/log
      - GLASSOPS_TERMINAL_USER=${GLASSOPS_TERMINAL_USER:-}
    restart: unless-stopped

volumes:
  glassops_data:
