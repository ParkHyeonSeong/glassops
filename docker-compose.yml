services:
  glassops:
    build: .
    ports:
      - "${GLASSOPS_BIND:-127.0.0.1}:${GLASSOPS_PORT:-7440}:7440"
    pid: host
    cgroup: host
    # Least privilege instead of `privileged: true`. The web terminal enters the
    # host namespaces via nsenter and su's to a host user, which needs exactly this
    # capability set (verified on Linux 6.8). Dropping the rest removes host device
    # access and kernel-module loading — escape vectors that don't need the docker
    # socket. nsenter requires apparmor/seccomp unconfined to enter the namespaces.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN            # entrypoint + nginx chown their data / temp dirs
      - SYS_ADMIN        # nsenter: setns into host namespaces (terminal)
      - SYS_PTRACE       # read /proc/1/ns/*
      - SYS_CHROOT       # nsenter / login namespace + root switch
      - DAC_READ_SEARCH
      - DAC_OVERRIDE     # read host files (e.g. shadow) as root
      - SETUID
      - SETGID           # su drops to the target host user
      - KILL             # process.kill on host processes owned by other users
    security_opt:
      - apparmor=unconfined
      - seccomp=unconfined
    volumes:
      - glassops_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/log:/host/log:ro
      - /proc:/host/proc:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /etc/os-release:/host/os-release:ro
    env_file: .env
    environment:
      - HOST_PROC=/host/proc
      - HOST_LOG=/host/log
      - GLASSOPS_TERMINAL_USER=${GLASSOPS_TERMINAL_USER:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7440/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  glassops_data:
