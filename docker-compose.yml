services:
  glassops:
    build: .
    ports:
      - "127.0.0.1:${GLASSOPS_PORT:-7440}:7440"
    pid: host
    privileged: true
    volumes:
      - glassops_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/log:/host/log:ro
      - /proc:/host/proc:ro
      - /etc/os-release:/host/os-release:ro
      - /usr/lib:/host/usr/lib:ro
      - /usr/local/lib:/host/usr/local/lib:ro
    env_file: .env
    environment:
      - HOST_PROC=/host/proc
      - HOST_LOG=/host/log
      - LD_LIBRARY_PATH=/host/usr/lib/x86_64-linux-gnu:/host/usr/local/lib:/host/usr/lib
      - GLASSOPS_TERMINAL_USER=${GLASSOPS_TERMINAL_USER:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7440/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  glassops_data:
